<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');

:root{
  --bg:#040304;
  --surface:#181818;
  --surface-2:#222222;
  --border:#2c2c2c;
  --border-2:#3e3e3e;
  --text:#ede9e0;
  --muted:#a29d92;
  --faint:#6c675e;
  --accent:#e3ba1c;
  --accent-hover:#f0cb3c;
  --accent-soft:rgba(227,186,28,.13);
  --accent-text:#040304;
  --blue:#2976c3;
  --blue-hover:#3f8bd6;
  --ok:#327345;
  --danger:#f24d0e;
  --radius:14px;
  --sans:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --serif:'Fraunces',Georgia,serif;
  --mono:'JetBrains Mono',ui-monospace,'SF Mono',Menlo,monospace;
}

*{box-sizing:border-box;margin:0;padding:0}

html,body{height:100%}

body{
  background:
    radial-gradient(1100px 460px at 50% -8%, #1b1b1b 0%, transparent 62%),
    var(--bg);
  color:var(--text);
  font-family:var(--sans);
  font-size:15px;
  line-height:1.55;
  -webkit-font-smoothing:antialiased;
}

::selection{background:var(--accent-soft);color:var(--accent-hover)}

::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--border-2);border-radius:8px;border:2px solid var(--bg)}
::-webkit-scrollbar-track{background:transparent}

button{font-family:inherit;cursor:pointer}

/* ---------- Header ---------- */
header{
  position:sticky;top:0;z-index:30;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 22px;
  background:color-mix(in srgb,var(--bg) 84%,transparent);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
}

.brand{display:flex;align-items:center;gap:11px;user-select:none;min-width:0}
.brand img.mark{
  width:32px;height:32px;border-radius:9px;object-fit:cover;
  flex-shrink:0;display:block;background:var(--surface);
  border:1px solid var(--border);
}
.brand h1{
  font-family:var(--serif);font-weight:600;font-size:19px;letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

.header-right{display:flex;align-items:center;gap:16px;flex-shrink:0}

.conn{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.conn .dot{width:7px;height:7px;border-radius:50%;background:var(--faint);transition:background .3s,box-shadow .3s}
.conn.on .dot{background:var(--ok);box-shadow:0 0 8px color-mix(in srgb,var(--ok) 75%,transparent)}
.conn.on{color:var(--muted)}
.conn.err .dot{background:var(--danger)}
.conn.err{color:var(--danger)}
.conn.wait .dot{animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{50%{opacity:.3}}

/* ---------- Buttons ---------- */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;
  padding:9px 16px;border-radius:10px;
  border:1px solid var(--border-2);
  background:var(--surface);color:var(--text);
  font-size:13.5px;font-weight:500;
  transition:background .15s,border-color .15s,color .15s,transform .05s;
  white-space:nowrap;
}
.btn:hover{background:var(--surface-2);border-color:var(--faint)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.45;cursor:default;transform:none}
.btn svg{width:15px;height:15px;flex-shrink:0}

.btn.primary{background:var(--accent);border-color:var(--accent);color:var(--accent-text);font-weight:600}
.btn.primary:hover{background:var(--accent-hover);border-color:var(--accent-hover)}

.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--text);background:var(--surface)}
.btn.ghost.danger:hover{color:var(--danger);background:rgba(242,77,14,.10)}

.btn.icon-only{padding:9px;border-radius:10px}

:focus-visible{outline:2px solid var(--blue);outline-offset:2px;border-radius:6px}

/* ---------- Main layout ---------- */
main{max-width:680px;margin:0 auto;padding:36px 22px 90px}

.view-title{
  font-family:var(--serif);font-weight:500;font-size:26px;
  margin-bottom:22px;letter-spacing:.005em;
}

/* ---------- Intake zone ---------- */
.dropzone{
  border:1.5px dashed var(--border-2);
  border-radius:var(--radius);
  padding:34px 24px;
  text-align:center;
  transition:border-color .2s,background .2s;
}
.dropzone.drag{border-color:var(--accent);background:var(--accent-soft)}
.dropzone .dz-icon{
  width:38px;height:38px;margin:0 auto 14px;border-radius:11px;
  background:var(--surface);border:1px solid var(--border);
  display:grid;place-items:center;color:var(--muted);
}
.dropzone .dz-icon svg{width:18px;height:18px}
.dropzone.drag .dz-icon{color:var(--accent);border-color:var(--accent)}
.dz-actions{display:flex;gap:10px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.dz-hint{font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}

/* ---------- Thumbnails ---------- */
.thumb-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(92px,1fr));
  gap:10px;margin-top:16px;
}
.thumb-grid:empty{display:none}

.tile{
  position:relative;aspect-ratio:1;border-radius:10px;overflow:hidden;
  border:1px solid var(--border);background:var(--surface);
}
.tile img{width:100%;height:100%;object-fit:cover;display:block}
.tile .fallback{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:8px;color:var(--muted);
}
.tile .fallback svg{width:22px;height:22px}
.tile .fallback span{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.tile.broken img{display:none}
.tile.broken .fallback{display:flex}

.tile .remove{
  position:absolute;top:6px;right:6px;width:22px;height:22px;border-radius:50%;
  border:none;background:rgba(4,3,4,.74);color:var(--text);
  display:grid;place-items:center;opacity:0;transition:opacity .15s;
}
.tile .remove svg{width:11px;height:11px}
.tile:hover .remove{opacity:1}
@media (hover:none){.tile .remove{opacity:1}}

/* ---------- Compose ---------- */
.field-label{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--faint);
  margin:26px 0 9px;display:block;
}

textarea{
  width:100%;min-height:130px;resize:vertical;
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:15px 16px;
  color:var(--text);font-family:var(--sans);font-size:14.5px;line-height:1.6;
  transition:border-color .15s;
}
textarea::placeholder{color:var(--faint)}
textarea:focus{outline:none;border-color:var(--accent)}

.compose-foot{
  display:flex;align-items:center;justify-content:space-between;
  gap:14px;margin-top:18px;
}
.status{font-family:var(--mono);font-size:11px;letter-spacing:.05em;color:var(--muted);min-height:1em}

/* ---------- Viewer ---------- */
.viewer-head{
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;margin-bottom:8px;
}
.viewer-meta{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.08em;
  text-transform:uppercase;color:var(--faint);margin-bottom:22px;
}

.viewer-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:12px;
}
.viewer-grid:empty{display:none}

.vtile{
  position:relative;aspect-ratio:1;border-radius:12px;overflow:hidden;
  border:1px solid var(--border);background:var(--surface);
}
.vtile img{width:100%;height:100%;object-fit:cover;display:block}
.vtile .fallback{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:9px;color:var(--muted);
}
.vtile .fallback svg{width:26px;height:26px}
.vtile .fallback span{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.vtile.broken img{display:none}
.vtile.broken .fallback{display:flex}

.vtile .bar{
  position:absolute;left:0;right:0;bottom:0;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
  padding:22px 10px 9px;
  background:linear-gradient(to top,rgba(4,3,4,.88),transparent);
  opacity:0;transition:opacity .15s;
}
.vtile:hover .bar{opacity:1}
@media (hover:none){.vtile .bar{opacity:1}}
.vtile .bar .fname{
  font-family:var(--mono);font-size:10px;color:var(--text);
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.vtile .bar a{
  flex-shrink:0;width:28px;height:28px;border-radius:8px;
  background:rgba(237,233,224,.14);color:var(--text);
  display:grid;place-items:center;text-decoration:none;
  transition:background .15s,color .15s;
}
.vtile .bar a:hover{background:var(--blue);color:#fff}
.vtile .bar a svg{width:13px;height:13px}

.vtile.loading::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(100deg,transparent 30%,rgba(237,233,224,.05) 50%,transparent 70%);
  background-size:200% 100%;
  animation:shimmer 1.3s linear infinite;
}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

.text-card{
  margin-top:20px;background:var(--surface);
  border:1px solid var(--border);border-radius:var(--radius);
  overflow:hidden;
}
.text-card .tc-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 16px;border-bottom:1px solid var(--border);
}
.text-card .tc-head span{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;
  text-transform:uppercase;color:var(--faint);
}
.text-card pre{
  padding:16px;white-space:pre-wrap;word-break:break-word;
  font-family:var(--sans);font-size:14.5px;line-height:1.65;
  max-height:420px;overflow-y:auto;
}

/* ---------- History panel ---------- */
.scrim{
  position:fixed;inset:0;z-index:40;background:rgba(4,3,4,.6);
  opacity:0;pointer-events:none;transition:opacity .25s;
}
.scrim.show{opacity:1;pointer-events:auto}

.panel{
  position:fixed;top:0;right:0;bottom:0;z-index:50;
  width:340px;max-width:92vw;
  background:#0d0d0d;border-left:1px solid var(--border);
  transform:translateX(100%);transition:transform .28s cubic-bezier(.32,.72,.24,1);
  display:flex;flex-direction:column;
}
.panel.open{transform:translateX(0);box-shadow:-24px 0 60px rgba(0,0,0,.5)}

.panel-head{
  display:flex;align-items:center;justify-content:space-between;
  padding:16px 18px;border-bottom:1px solid var(--border);flex-shrink:0;
}
.panel-head h2{font-family:var(--serif);font-weight:500;font-size:18px}
.panel-head .count{
  font-family:var(--mono);font-size:10.5px;color:var(--faint);
  margin-left:9px;letter-spacing:.06em;
}

.history{list-style:none;overflow-y:auto;flex:1;padding:10px}
.history .empty{
  padding:44px 20px;text-align:center;color:var(--faint);
  font-size:13.5px;
}

.hitem{
  width:100%;text-align:left;border:1px solid transparent;background:transparent;
  border-radius:11px;padding:12px 13px;margin-bottom:2px;
  transition:background .12s,border-color .12s;color:var(--text);
}
.hitem:hover{background:var(--surface)}
.hitem.active{background:var(--surface);border-color:var(--border-2)}
.hitem .h-title{
  font-size:13.5px;font-weight:500;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  margin-bottom:4px;
}
.hitem .h-meta{
  display:flex;align-items:center;gap:8px;
  font-family:var(--mono);font-size:10px;letter-spacing:.07em;
  text-transform:uppercase;color:var(--faint);
}
.hitem .h-meta svg{width:11px;height:11px;flex-shrink:0}

/* ---------- Toast ---------- */
.toast{
  position:fixed;left:50%;bottom:26px;z-index:60;
  transform:translate(-50%,16px);
  background:var(--surface-2);border:1px solid var(--border-2);
  color:var(--text);font-size:13.5px;font-weight:500;
  padding:11px 18px;border-radius:12px;
  opacity:0;pointer-events:none;
  transition:opacity .2s,transform .2s;
  max-width:88vw;text-align:center;
}
.toast.show{opacity:1;transform:translate(-50%,0)}
.toast.err{border-color:var(--danger);color:var(--danger)}
.toast.ok{border-color:var(--ok)}

[hidden]{display:none !important}

@media (max-width:560px){
  main{padding:26px 16px 80px}
  .brand h1{font-size:15.5px}
  .conn span.lbl{display:none}
  .header-right{gap:8px}
}

@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none !important;transition:none !important}
}
</style>
</head>
<body>

<header>
  <div class="brand">
    <img class="mark" src="https://avatars.githubusercontent.com/u/128335015?s=400&u=3c5cfc65ac8c2dad4890ec9cea57a4a42f6ecb3d&v=4" alt="FirstUPCJax logo" width="32" height="32">
    <h1>FirstUPCJax MediaShare</h1>
  </div>
  <div class="header-right">
    <div class="conn wait" id="conn"><span class="dot"></span><span class="lbl" id="connLabel">Connecting</span></div>
    <button class="btn" id="historyBtn" aria-label="Open history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
      History
    </button>
  </div>
</header>

<main>
  <!-- Compose -->
  <section id="composeView">
    <h2 class="view-title">New drop</h2>

    <div class="dropzone" id="dropzone">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-4.5-4.5L7 20"/></svg>
      </div>
      <div class="dz-actions">
        <button class="btn" id="uploadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0L7 9m5-5l5 5"/><path d="M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>
          Upload
        </button>
        <button class="btn" id="pasteBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="8" y="2.5" width="8" height="4" rx="1.5"/><path d="M16 4.5h2a2 2 0 012 2V20a2 2 0 01-2 2H6a2 2 0 01-2-2V6.5a2 2 0 012-2h2"/></svg>
          Paste
        </button>
      </div>
      <div class="dz-hint">Drag and drop, or Ctrl+V anywhere</div>
      <input type="file" id="fileInput" accept="image/*,.tif,.tiff,.heic,.heif" multiple hidden>
    </div>

    <div class="thumb-grid" id="stagedGrid"></div>

    <label class="field-label" for="textInput">Text</label>
    <textarea id="textInput" placeholder="Write or paste text to include with this drop..."></textarea>

    <div class="compose-foot">
      <div class="status" id="status"></div>
      <button class="btn primary" id="submitBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 13l4.5 4.5L19 7"/></svg>
        Save drop
      </button>
    </div>
  </section>

  <!-- Viewer -->
  <section id="viewerView" hidden>
    <div class="viewer-head">
      <button class="btn ghost" id="backBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 5l-7 7 7 7"/></svg>
        New drop
      </button>
      <button class="btn ghost danger" id="deleteBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 7h16M9 7V5a1 1 0 011-1h4a1 1 0 011 1v2m3 0l-.8 12.2a2 2 0 01-2 1.8H8.8a2 2 0 01-2-1.8L6 7"/></svg>
        Delete
      </button>
    </div>
    <div class="viewer-meta" id="viewerMeta"></div>
    <div class="viewer-grid" id="viewerImages"></div>
    <div class="text-card" id="viewerTextCard" hidden>
      <div class="tc-head">
        <span>Text</span>
        <button class="btn ghost" id="copyTextBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="12" height="12" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy
        </button>
      </div>
      <pre id="viewerText"></pre>
    </div>
  </section>
</main>

<!-- History panel -->
<div class="scrim" id="scrim"></div>
<aside class="panel" id="panel" aria-label="History">
  <div class="panel-head">
    <h2>History<span class="count" id="historyCount"></span></h2>
    <button class="btn ghost icon-only" id="closePanelBtn" aria-label="Close history">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
    </button>
  </div>
  <ul class="history" id="historyList"></ul>
</aside>

<div class="toast" id="toast"></div>

<script type="module">

const composeView = $('#composeView'), viewerView = $('#viewerView');

  toastEl.textContent = msg;
  toastEl.classList.remove('err','ok');
  if (kind) toastEl.classList.add(kind);
  toastEl.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toastEl.classList.remove('show'), kind === 'err' ? 4200 : 2400);
}

function setStatus(msg){ statusEl.textContent = msg; }

function setConn(state, label){
  conn.className = 'conn ' + state;
  connLabel.textContent = label;
}

function fmtDate(ts){
  if (!ts || typeof ts.toDate !== 'function') return 'Just now';
  const d = ts.toDate();
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' }) +
    ' \u00B7 ' + d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
}

function fileExt(name){
  const p = (name || '').split('.').pop();
  return (p && p.length <= 5 && p !== name) ? p.toUpperCase() : 'IMG';
}

function extFromMime(t){
  const m = { 'image/png':'png','image/jpeg':'jpg','image/gif':'gif','image/webp':'webp',
    'image/tiff':'tiff','image/bmp':'bmp','image/svg+xml':'svg','image/avif':'avif' };
  return m[t] || 'png';
}

function isImageFile(f){
  return (f.type && f.type.startsWith('image/')) ||
    /\.(png|jpe?g|gif|webp|bmp|tiff?|svg|avif|heic|heif)$/i.test(f.name || '');
}

function splitChunks(s){
  const out = [];
  for (let i = 0; i < s.length; i += CHUNK_SIZE) out.push(s.slice(i, i + CHUNK_SIZE));
  return out;
}

function readAsDataUrl(file){
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result);
    r.onerror = () => rej(new Error('Could not read ' + file.name));
    r.readAsDataURL(file);
  });
}

function dataUrlToBlob(dataUrl){
  const comma = dataUrl.indexOf(',');
  const head = dataUrl.slice(0, comma);
  const b64 = dataUrl.slice(comma + 1);
  const mime = (head.match(/data:(.*?)(;|$)/) || [])[1] || 'application/octet-stream';
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return new Blob([bytes], { type: mime });
}

const svgImage = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="2"/><path d="M21 15l-4.5-4.5L7 20"/></svg>';
const svgDownload = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 4v11m0 0l-4.5-4.5M12 15l4.5-4.5"/><path d="M4 18v1a2 2 0 002 2h12a2 2 0 002-2v-1"/></svg>';
const svgX = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>';

// ---------------- Auth ----------------
setConn('wait', 'Connecting');
onAuthStateChanged(auth, u => {
  user = u;
  if (u){
    setConn('on', 'Connected');
    startHistory();
  }
});
signInAnonymously(auth).catch(err => {
  console.error(err);
  setConn('err', 'Offline');
  toast('Could not connect. Enable Anonymous sign-in under Authentication in your Firebase console.', 'err');
});

// ---------------- Adding images ----------------
async function addFiles(fileList){
  const files = [...fileList].filter(isImageFile);
  const skipped = fileList.length - files.length;
  if (skipped > 0) toast(skipped + ' file' + (skipped > 1 ? 's were' : ' was') + ' skipped (images only)');
  for (const f of files){
    if (f.size > MAX_FILE_BYTES){
      toast(f.name + ' is over 15 MB and was skipped', 'err');
      continue;
    }
    try{
      const dataUrl = await readAsDataUrl(f);
      staged.push({ name: f.name || ('image.' + extFromMime(f.type)), type: f.type || '', dataUrl });
    }catch(e){
      toast(e.message, 'err');
    }
  }
  renderStaged();
}

function renderStaged(){
  stagedGrid.innerHTML = '';
  staged.forEach((img, i) => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    const el = document.createElement('img');
    el.alt = img.name;
    el.src = img.dataUrl;
    el.onerror = () => tile.classList.add('broken');
    const fb = document.createElement('div');
    fb.className = 'fallback';
    fb.innerHTML = svgImage + '<span>' + fileExt(img.name) + '</span>';
    const rm = document.createElement('button');
    rm.className = 'remove';
    rm.setAttribute('aria-label', 'Remove ' + img.name);
    rm.innerHTML = svgX;
    rm.onclick = () => { staged.splice(i, 1); renderStaged(); };
    tile.append(el, fb, rm);
    stagedGrid.appendChild(tile);
  });
}

// Upload
uploadBtn.onclick = () => fileInput.click();
fileInput.onchange = () => { addFiles(fileInput.files); fileInput.value = ''; };

// Paste button
pasteBtn.onclick = async () => {
  try{
    const items = await navigator.clipboard.read();
    let foundImage = false;
    for (const item of items){
      for (const t of item.types){
        if (t.startsWith('image/')){
          const blob = await item.getType(t);
          await addFiles([ new File([blob], 'pasted-' + Date.now() + '.' + extFromMime(t), { type: t }) ]);
          foundImage = true;
        }
      }
    }
    if (!foundImage){
      const txt = await navigator.clipboard.readText().catch(() => '');
      if (txt){
        textInput.value = textInput.value ? textInput.value + '\n' + txt : txt;
        toast('Text pasted');
      } else {
        toast('Clipboard is empty. Try Ctrl+V.');
      }
    }
  }catch{
    toast('Press Ctrl+V (Cmd+V on Mac) to paste');
  }
};

// Ctrl+V anywhere
document.addEventListener('paste', e => {
  const items = [...(e.clipboardData?.items || [])].filter(i => i.type.startsWith('image/'));
  if (!items.length) return;
  e.preventDefault();
  const files = items.map(i => i.getAsFile()).filter(Boolean);
  if (files.length) addFiles(files);
});

// Drag and drop anywhere on the page
let dragDepth = 0;
window.addEventListener('dragenter', e => {
  e.preventDefault();
  dragDepth++;
  dropzone.classList.add('drag');
});
window.addEventListener('dragover', e => e.preventDefault());
window.addEventListener('dragleave', e => {
  e.preventDefault();
  dragDepth = Math.max(0, dragDepth - 1);
  if (dragDepth === 0) dropzone.classList.remove('drag');
});
window.addEventListener('drop', e => {
  e.preventDefault();
  dragDepth = 0;
  dropzone.classList.remove('drag');
  if (e.dataTransfer?.files?.length) addFiles(e.dataTransfer.files);
});

// ---------------- Saving ----------------
async function saveDrop(){
  const text = textInput.value.trim();
  if (!text && !staged.length){ toast('Add an image or some text first'); return; }
  if (!user){ toast('Still connecting, one moment'); return; }

  submitBtn.disabled = true;
  try{
    const imagesMeta = [];
    for (let n = 0; n < staged.length; n++){
      setStatus('Saving image ' + (n + 1) + ' of ' + staged.length);
      const img = staged[n];
      const key = crypto.randomUUID();
      const parts = splitChunks(img.dataUrl);
      for (let i = 0; i < parts.length; i++){
        await setDoc(doc(db, COLL, 'chunk_' + key + '_' + i), {
          kind: 'chunk', key, index: i, data: parts[i]
        });
      }
      imagesMeta.push({ name: img.name, type: img.type, key, chunks: parts.length });
    }
    setStatus('Finishing');
    await addDoc(collection(db, COLL), {
      kind: 'drop',
      text,
      images: imagesMeta,
      createdAt: serverTimestamp()
    });
    staged = [];
    renderStaged();
    textInput.value = '';
    setStatus('');
    toast('Drop saved', 'ok');
  }catch(e){
    console.error(e);
    setStatus('');
    toast('Save failed: ' + (e.code || e.message), 'err');
  }finally{
    submitBtn.disabled = false;
  }
}
submitBtn.onclick = saveDrop;
textInput.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') saveDrop();
});

// ---------------- History ----------------
function startHistory(){
  if (unsubHistory) return;
  const q = query(collection(db, COLL), where('kind', '==', 'drop'));
  unsubHistory = onSnapshot(q, snap => {
    drops = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    const t = x => (x.createdAt && typeof x.createdAt.toMillis === 'function')
      ? x.createdAt.toMillis() : Number.MAX_SAFE_INTEGER;
    drops.sort((a, b) => t(b) - t(a));
    renderHistory();
  }, err => {
    console.error(err);
    toast('Could not load history: ' + (err.code || err.message), 'err');
  });
}

function renderHistory(){
  historyCount.textContent = drops.length ? String(drops.length) : '';
  historyList.innerHTML = '';
  if (!drops.length){
    const li = document.createElement('li');
    li.className = 'empty';
    li.textContent = 'Nothing here yet. Save a drop and it will show up in this list.';
    historyList.appendChild(li);
    return;
  }
  drops.forEach(d => {
    const imgCount = d.images?.length || 0;
    const firstLine = (d.text || '').split('\n')[0].trim();
    const title = firstLine
      ? (firstLine.length > 64 ? firstLine.slice(0, 64) + '\u2026' : firstLine)
      : (imgCount ? 'Images only' : 'Empty drop');
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.className = 'hitem' + (currentDrop && currentDrop.id === d.id ? ' active' : '');
    btn.innerHTML =
      '<div class="h-title"></div>' +
      '<div class="h-meta"><span>' + fmtDate(d.createdAt) + '</span>' +
      (imgCount ? '<span>\u00B7</span>' + svgImage + '<span>' + imgCount + '</span>' : '') +
      '</div>';
    btn.querySelector('.h-title').textContent = title;
    btn.onclick = () => { openDrop(d); closePanel(); };
    li.appendChild(btn);
    historyList.appendChild(li);
  });
}

// ---------------- Viewer ----------------
function revokeUrls(){
  liveUrls.forEach(u => URL.revokeObjectURL(u));
  liveUrls = [];
}

async function openDrop(d){
  currentDrop = d;
  renderHistory();
  revokeUrls();

  composeView.hidden = true;
  viewerView.hidden = false;
  window.scrollTo({ top: 0 });

  const imgCount = d.images?.length || 0;
  viewerMeta.textContent = fmtDate(d.createdAt) +
    ' \u00B7 ' + imgCount + (imgCount === 1 ? ' image' : ' images') +
    (d.text ? ' \u00B7 with text' : '');

  if (d.text){
    viewerText.textContent = d.text;
    viewerTextCard.hidden = false;
  } else {
    viewerTextCard.hidden = true;
  }

  viewerImages.innerHTML = '';
  const tiles = (d.images || []).map(meta => {
    const tile = document.createElement('div');
    tile.className = 'vtile loading';
    viewerImages.appendChild(tile);
    return tile;
  });

  for (let idx = 0; idx < (d.images || []).length; idx++){
    const meta = d.images[idx];
    const tile = tiles[idx];
    try{
      const snaps = await Promise.all(
        Array.from({ length: meta.chunks }, (_, i) =>
          getDoc(doc(db, COLL, 'chunk_' + meta.key + '_' + i)))
      );
      if (currentDrop !== d) return; // user navigated away
      if (snaps.some(s => !s.exists())) throw new Error('missing data');
      const dataUrl = snaps.map(s => s.data().data).join('');
      const url = URL.createObjectURL(dataUrlToBlob(dataUrl));
      liveUrls.push(url);

      tile.classList.remove('loading');
      const img = document.createElement('img');
      img.alt = meta.name;
      img.src = url;
      img.onerror = () => tile.classList.add('broken');
      const fb = document.createElement('div');
      fb.className = 'fallback';
      fb.innerHTML = svgImage + '<span>' + fileExt(meta.name) + '</span>';
      const bar = document.createElement('div');
      bar.className = 'bar';
      const fname = document.createElement('span');
      fname.className = 'fname';
      fname.textContent = meta.name;
      const a = document.createElement('a');
      a.href = url;
      a.download = meta.name || 'image';
      a.setAttribute('aria-label', 'Download ' + meta.name);
      a.innerHTML = svgDownload;
      bar.append(fname, a);
      tile.append(img, fb, bar);
    }catch(e){
      console.error(e);
      if (currentDrop !== d) return;
      tile.classList.remove('loading');
      tile.classList.add('broken');
      const fb = document.createElement('div');
      fb.className = 'fallback';
      fb.innerHTML = svgImage + '<span>Unavailable</span>';
      tile.appendChild(fb);
    }
  }
}

function backToCompose(){
  currentDrop = null;
  revokeUrls();
  viewerView.hidden = true;
  composeView.hidden = false;
  renderHistory();
}
backBtn.onclick = backToCompose;

copyTextBtn.onclick = async () => {
  try{
    await navigator.clipboard.writeText(viewerText.textContent);
    toast('Text copied', 'ok');
  }catch{
    toast('Could not copy. Select the text and copy manually.', 'err');
  }
};

deleteBtn.onclick = async () => {
  if (!currentDrop) return;
  if (!confirm('Delete this drop permanently?')) return;
  const d = currentDrop;
  deleteBtn.disabled = true;
  try{
    const ops = [deleteDoc(doc(db, COLL, d.id))];
    for (const m of d.images || []){
      for (let i = 0; i < m.chunks; i++){
        ops.push(deleteDoc(doc(db, COLL, 'chunk_' + m.key + '_' + i)));
      }
    }
    await Promise.all(ops);
    toast('Drop deleted', 'ok');
    backToCompose();
  }catch(e){
    console.error(e);
    toast('Delete failed: ' + (e.code || e.message), 'err');
  }finally{
    deleteBtn.disabled = false;
  }
};

// ---------------- Panel ----------------
function openPanel(){ panel.classList.add('open'); scrim.classList.add('show'); }
function closePanel(){ panel.classList.remove('open'); scrim.classList.remove('show'); }
historyBtn.onclick = openPanel;
closePanelBtn.onclick = closePanel;
scrim.onclick = closePanel;
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
